name: Daily Activity Report

on:
  schedule:
    # Run at 8pm Bangkok time (ICT = UTC+7) → 1pm UTC, every day
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Generate dashboard
        run: |
          python fetch_and_generate.py \
            --output index.html \
            --slack-webhook-url "${{ secrets.SLACK_WEBHOOK_URL }}" \
            --github-pages-url "https://vicvaravarn.github.io/Zaapi-Daily-Report/"

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update daily report - $(date +'%d/%m/%Y %H:%M UTC')"
          git push
